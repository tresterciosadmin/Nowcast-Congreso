<!DOCTYPE html>
<!-- ================================================================
  TABLERO DE CONTROL — Nowcast Legislativo Argentino
  Este archivo es el DISEÑO y NO SE EDITA.
  Los datos viven en tablero_datos.js (mismo directorio) — ese es el
  único archivo que se actualiza. Ver reglas en CLAUDE.md.
  Se abre con doble click; no necesita servidor ni internet.
================================================================= -->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tablero de Control — Nowcast Legislativo</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1a2233; --muted:#5b6577;
    --line:#e3e7ee; --brand:#1e3a5f; --brand2:#2e6da4;
    --hecho:#1e7d46; --hecho-bg:#e3f4ea;
    --curso:#b97a00; --curso-bg:#fdf3dd;
    --parcial:#8a6d00; --parcial-bg:#faf6e0;
    --pend:#7a4ec2; --pend-bg:#f0eafb;
    --futuro:#5b6577; --futuro-bg:#eef0f4;
    --repl:#b3403f; --repl-bg:#fdeaea;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  header{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:26px 32px 18px}
  header h1{margin:0;font-size:1.45rem;font-weight:600}
  header .sub{opacity:.85;font-size:.92rem;margin-top:4px}
  header .meta{opacity:.75;font-size:.8rem;margin-top:8px}
  .kpis{display:flex;flex-wrap:wrap;gap:12px;padding:16px 32px;background:var(--panel);border-bottom:1px solid var(--line)}
  .kpi{flex:1 1 180px;min-width:170px;border:1px solid var(--line);border-radius:10px;padding:10px 14px;background:var(--bg)}
  .kpi .v{font-size:1.25rem;font-weight:700;color:var(--brand)}
  .kpi .e{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .kpi .d{font-size:.78rem;color:var(--muted);margin-top:2px}
  nav{display:flex;flex-wrap:wrap;gap:4px;padding:10px 32px;background:var(--panel);border-bottom:2px solid var(--line);position:sticky;top:0;z-index:5}
  nav button{border:0;background:transparent;padding:9px 14px;font-size:.92rem;color:var(--muted);cursor:pointer;border-radius:8px 8px 0 0;border-bottom:3px solid transparent;font-weight:600}
  nav button:hover{color:var(--brand)}
  nav button.on{color:var(--brand);border-bottom-color:var(--brand2);background:var(--bg)}
  main{max-width:1200px;margin:0 auto;padding:24px 32px 60px}
  section.tab{display:none}
  section.tab.on{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  h2{font-size:1.15rem;color:var(--brand);margin:26px 0 10px}
  h2:first-child{margin-top:0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin-bottom:14px}
  .chip{display:inline-block;padding:2px 11px;border-radius:999px;font-size:.74rem;font-weight:700;letter-spacing:.03em;vertical-align:middle;white-space:nowrap}
  .c-HECHO{color:var(--hecho);background:var(--hecho-bg)}
  .c-ENCURSO{color:var(--curso);background:var(--curso-bg)}
  .c-PARCIAL{color:var(--parcial);background:var(--parcial-bg)}
  .c-PENDIENTE{color:var(--pend);background:var(--pend-bg)}
  .c-FUTURO{color:var(--futuro);background:var(--futuro-bg)}
  .c-REPLANTEADO{color:var(--repl);background:var(--repl-bg)}
  details{margin-top:8px}
  summary{cursor:pointer;color:var(--brand2);font-size:.86rem;font-weight:600;user-select:none}
  summary:hover{text-decoration:underline}
  details ul{margin:8px 0 2px;padding-left:20px;color:var(--muted);font-size:.9rem}
  details li{margin-bottom:5px}
  .mod-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .mod-head .letra{font-size:1.5rem;font-weight:800;color:var(--brand2);opacity:.5}
  .mod-head h3{margin:0;font-size:1.02rem}
  .pregunta{color:var(--muted);font-style:italic;font-size:.88rem;margin:2px 0 8px}
  .vars{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:8px;margin-top:10px}
  .var{border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:.85rem;background:var(--bg)}
  .var b{display:block;margin-bottom:2px}
  .var .chip{float:right;margin-left:8px}
  .barra{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:8px 0 4px}
  .barra i{display:block;height:100%;background:linear-gradient(90deg,var(--brand2),var(--hecho));border-radius:99px}
  .etapa-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .etapa-head h3{margin:0;font-size:1rem}
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:12px;overflow:hidden;font-size:.9rem}
  th{background:var(--brand);color:#fff;text-align:left;padding:9px 12px;font-weight:600;font-size:.82rem}
  td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:last-child td{border-bottom:0}
  .filtros{margin:10px 0 14px;display:flex;gap:6px;flex-wrap:wrap}
  .filtros button{border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:5px 14px;font-size:.82rem;cursor:pointer;color:var(--muted);font-weight:600}
  .filtros button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .hito{display:flex;gap:16px;margin-bottom:2px}
  .hito .f{flex:0 0 92px;color:var(--muted);font-size:.8rem;font-weight:700;padding-top:3px;text-align:right}
  .hito .linea{flex:0 0 14px;position:relative}
  .hito .linea::before{content:"";position:absolute;left:6px;top:6px;bottom:-8px;width:2px;background:var(--line)}
  .hito:last-child .linea::before{bottom:auto;height:10px}
  .hito .linea::after{content:"";position:absolute;left:1px;top:5px;width:12px;height:12px;border-radius:50%;background:var(--brand2);border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}
  .hito .cuerpo{flex:1;padding-bottom:18px}
  .hito .cuerpo b{font-size:.95rem}
  .hito .cuerpo p{margin:3px 0 0;color:var(--muted);font-size:.88rem}
  .prio{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
  .prio .n{flex:0 0 30px;height:30px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem}
  .nota-caja{border-left:4px solid var(--curso);background:var(--curso-bg);padding:10px 14px;border-radius:0 8px 8px 0;font-size:.88rem;margin-bottom:14px}
  .regla-caja{border-left:4px solid var(--brand2);background:#eaf2fa;padding:12px 16px;border-radius:0 8px 8px 0;font-size:.9rem;margin-bottom:10px}
  .dos-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:860px){.dos-col{grid-template-columns:1fr}}
  .muted{color:var(--muted);font-size:.9rem}
  footer{text-align:center;color:var(--muted);font-size:.78rem;padding:20px}
</style>
</head>
<body>
<header>
  <h1 id="h-titulo"></h1>
  <div class="sub" id="h-mision"></div>
  <div class="meta" id="h-meta"></div>
</header>
<div class="kpis" id="kpis"></div>
<nav id="tabs"></nav>
<main id="main"></main>
<footer>Tablero de control del proyecto · el diseño (este HTML) no se edita · los datos viven en <b>tablero_datos.js</b></footer>

<script src="tablero_datos.js"></script>
<script>
(function(){
  const T = TABLERO;
  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s??"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const chip = (e)=>`<span class="chip c-${String(e).replace(/\s/g,"")}">${esc(e)}</span>`;

  // ---------- header + kpis ----------
  $("#h-titulo").textContent = T.proyecto.nombre;
  $("#h-mision").textContent = T.proyecto.mision;
  $("#h-meta").textContent = `Última actualización: ${T.actualizado} — ${T.actualizado_por}`;
  $("#kpis").innerHTML = T.kpis.map(k=>
    `<div class="kpi"><div class="e">${esc(k.etiqueta)}</div><div class="v">${esc(k.valor)}</div><div class="d">${esc(k.detalle)}</div></div>`).join("");

  // ---------- pestañas ----------
  const tabs = [
    ["vision","La Plataforma"],
    ["ruta","Hoja de Ruta"],
    ["repo","Módulos del Repo"],
    ["datos","Datos y Métricas"],
    ["hitos","Bitácora"],
    ["pend","Pendientes y Revisiones"],
    ["presu","Presupuesto"]
  ];
  $("#tabs").innerHTML = tabs.map(([id,n],i)=>`<button data-t="${id}" class="${i===0?"on":""}">${n}</button>`).join("");
  $("#main").innerHTML = tabs.map(([id],i)=>`<section class="tab ${i===0?"on":""}" id="tab-${id}"></section>`).join("");
  $("#tabs").addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b) return;
    document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("on",x===b));
    document.querySelectorAll("section.tab").forEach(s=>s.classList.toggle("on",s.id==="tab-"+b.dataset.t));
  });

  // ---------- 1. La Plataforma ----------
  $("#tab-vision").innerHTML = `
    <h2>Cómo funciona</h2>
    <div class="card"><ul style="margin:4px 0;padding-left:20px">${T.proyecto.dinamica.map(d=>`<li style="margin-bottom:6px">${esc(d)}</li>`).join("")}</ul></div>
    <h2>Los 4 módulos del producto</h2>
    ${T.modulos_plataforma.map(m=>`
      <div class="card">
        <div class="mod-head"><span class="letra">${m.id}</span><h3>${esc(m.nombre)}</h3>${chip(m.estado)}</div>
        <div class="pregunta">${esc(m.pregunta)}</div>
        <div style="font-size:.93rem">${esc(m.resumen_humano)}</div>
        ${m.detalle_tecnico.length?`<details><summary>Detalle técnico</summary><ul>${m.detalle_tecnico.map(d=>`<li>${esc(d)}</li>`).join("")}</ul></details>`:""}
        ${m.variables.length?`<details><summary>Variables del módulo (${m.variables.length})</summary>
          <div class="vars">${m.variables.map(v=>`<div class="var">${chip(v.estado)}<b>${esc(v.nombre)}</b>${esc(v.desc)}</div>`).join("")}</div>
        </details>`:""}
      </div>`).join("")}`;

  // ---------- 2. Hoja de ruta ----------
  $("#tab-ruta").innerHTML = `
    <h2>Etapas del plan (fusionadas con el estado real)</h2>
    ${T.etapas.map(e=>`
      <div class="card">
        <div class="etapa-head"><h3>${esc(e.nombre)}</h3>${chip(e.estado)}</div>
        <div class="barra"><i style="width:${e.avance}%"></i></div>
        <div class="muted" style="font-size:.78rem">${e.avance}% </div>
        <div style="font-size:.93rem;margin-top:6px">${esc(e.resumen_humano)}</div>
        ${e.detalle.length?`<details><summary>Qué hay construido / cómo</summary><ul>${e.detalle.map(d=>`<li>${esc(d)}</li>`).join("")}</ul></details>`:""}
        ${e.pendiente.length?`<details><summary>Qué falta (${e.pendiente.length})</summary><ul>${e.pendiente.map(d=>`<li>${esc(d)}</li>`).join("")}</ul></details>`:""}
      </div>`).join("")}`;

  // ---------- 3. Módulos del repo ----------
  const estados = [...new Set(T.modulos_repo.map(m=>m.estado))];
  $("#tab-repo").innerHTML = `
    <h2>Semáforo por módulo <span class="muted" style="font-weight:400">(la unidad de trabajo del repo: un módulo, un dueño, una rama)</span></h2>
    <div class="filtros" id="f-repo"><button data-f="*" class="on">Todos (${T.modulos_repo.length})</button>
      ${estados.map(e=>`<button data-f="${e}">${e} (${T.modulos_repo.filter(m=>m.estado===e).length})</button>`).join("")}</div>
    <table><thead><tr><th style="width:24%">Módulo</th><th style="width:13%">Estado</th><th style="width:13%">Owner</th><th>Nota</th></tr></thead>
    <tbody id="tb-repo">${T.modulos_repo.map(m=>`
      <tr data-e="${m.estado}"><td><b>${esc(m.modulo)}</b></td><td>${chip(m.estado)}</td><td>${esc(m.owner)}</td><td class="muted">${esc(m.nota)}</td></tr>`).join("")}
    </tbody></table>`;
  $("#f-repo").addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b) return;
    document.querySelectorAll("#f-repo button").forEach(x=>x.classList.toggle("on",x===b));
    document.querySelectorAll("#tb-repo tr").forEach(tr=>{
      tr.style.display = (b.dataset.f==="*"||tr.dataset.e===b.dataset.f)?"":"none";
    });
  });

  // ---------- 4. Datos y métricas ----------
  $("#tab-datos").innerHTML = `
    <h2>Cobertura de la base canónica</h2>
    <div class="muted" style="margin-bottom:8px">${esc(T.cobertura.descripcion)}</div>
    <table><thead><tr><th>Período</th><th>Diputados</th><th>Senado</th></tr></thead>
    <tbody>${T.cobertura.filas.map(f=>`<tr><td><b>${esc(f.periodo)}</b></td><td>${esc(f.diputados)}</td><td>${esc(f.senado)}</td></tr>`).join("")}</tbody></table>
    <div class="card" style="margin-top:14px"><b style="font-size:.9rem">Notas de calidad</b>
      <ul style="margin:6px 0;padding-left:20px;font-size:.88rem;color:var(--muted)">${T.cobertura.notas.map(n=>`<li>${esc(n)}</li>`).join("")}</ul></div>
    <h2>Métricas clave</h2>
    <div class="vars">${T.metricas.map(m=>`<div class="var"><b>${esc(m.nombre)}: <span style="color:var(--brand)">${esc(m.valor)}</span></b>${esc(m.contexto)}</div>`).join("")}</div>`;

  // ---------- 5. Bitácora ----------
  $("#tab-hitos").innerHTML = `
    <h2>Línea de tiempo (lo más nuevo arriba)</h2>
    <div class="card">${T.hitos.map(h=>`
      <div class="hito"><div class="f">${esc(h.fecha)}</div><div class="linea"></div>
        <div class="cuerpo"><b>${esc(h.titulo)}</b><p>${esc(h.texto)}</p></div></div>`).join("")}
      <div class="muted" style="margin-top:6px">El relato completo vive en <b>coordinacion/EN-HUMANO.md</b>; el detalle técnico en <b>coordinacion/ESTADO-DEL-PROYECTO.md</b>.</div>
    </div>`;

  // ---------- 6. Pendientes y revisiones ----------
  $("#tab-pend").innerHTML = `
    <h2>Próximos pasos, en orden</h2>
    <div class="card">${T.pendientes.map(p=>`
      <div class="prio"><div class="n">${p.prioridad}</div>
        <div><b>${esc(p.titulo)}</b> <span class="muted">· ${esc(p.depende)}</span>
        <div class="muted">${esc(p.detalle)}</div></div></div>`).join("")}</div>
    <h2>Revisiones que requieren un humano</h2>
    ${T.revisiones.map(r=>`
      <div class="nota-caja"><b>${esc(r.que)}</b> <span class="muted">— ${esc(r.donde)}</span><br>${esc(r.detalle)}</div>`).join("")}
    <h2>Reglas de este tablero</h2>
    ${T.reglas.map(r=>`<div class="regla-caja">${esc(r)}</div>`).join("")}`;

  // ---------- 7. Presupuesto ----------
  $("#tab-presu").innerHTML = `
    <div class="nota-caja">${esc(T.presupuesto.nota)}</div>
    <div class="dos-col">
      <div><h2>Desarrollo (CAPEX — meses 1 a 3)</h2>
        <table><thead><tr><th>Ítem</th><th>Descripción</th><th>Rango</th></tr></thead>
        <tbody>${T.presupuesto.capex.map(c=>`<tr><td><b>${esc(c.item)}</b></td><td class="muted">${esc(c.desc)}</td><td><b>${esc(c.rango)}</b></td></tr>`).join("")}</tbody></table></div>
      <div><h2>Operación mensual (OPEX)</h2>
        <table><thead><tr><th>Ítem</th><th>Descripción</th><th>Óptimo</th><th>Conservador</th></tr></thead>
        <tbody>${T.presupuesto.opex.map(c=>`<tr><td><b>${esc(c.item)}</b></td><td class="muted">${esc(c.desc)}</td><td>${esc(c.optimo)}</td><td>${esc(c.conservador)}</td></tr>`).join("")}</tbody></table></div>
    </div>`;
})();
</script>
</body>
</html>
